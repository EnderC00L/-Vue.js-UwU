<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="main.css"> 
</head>
<body>
    <div id="todo-app" class="container">
        <div class="header">
            <h1>{{ header }}</h1>
            <button v-if="editing" @click="doEdit(false)" class="btn btn-cancel">Отмена</button>
            <button v-else @click="doEdit(true)" class="btn btn-primary">Новое дело</button>
        </div>
        
        <div v-if="editing" class="add-item-form">
            <input
                @keyup.enter="saveItem"
                type="text" 
                v-model="newItem" 
                placeholder="Что нужно сделать?">
            
            <label class="priority-label">
                <input type="checkbox" v-model="newItemHighPriority"> 
                Важное
            </label>

            <button
                :disabled="newItem.length < 2"
                @click="saveItem"
                class="btn btn-primary">
                Сохранить
            </button>
        </div>
        
        <p v-if="items.length === 0" class="empty-msg">Отлично! Все задачи выполнены.</p>
        
        <ul>
            <li 
                v-for="item in reversedItems" 
                @click="toggleStatus(item)"
                :key="item.id"
                :class="{ strikeout: item.completed, priority: item.highPriority }"
            >
                {{ item.label }}
            </li>
        </ul>
    </div>

    <script src="https://unpkg.com/vue@3"></script>
    <script>
        const todoApp = Vue.createApp({
            data() {
                return {
                    header: "Список дел",
                    editing: false,
                    newItem: '',
                    newItemHighPriority: false, 
                    items: [
                        {id: 1, label: 'Выучить основы Vue.js', completed: true, highPriority: true},
                        {id: 2, label: 'Создать репозиторий на GitHub', completed: false, highPriority: false},
                        {id: 3, label: 'Загрузить проект', completed: false, highPriority: true},
                    ]
                }
            },
            computed: {
                reversedItems() {
                    return [...this.items].reverse();
                }
            },
            methods: {
                saveItem() {
                    if (this.newItem.length < 2) return;
                    
                    this.items.push({
                        id: Date.now(),
                        label: this.newItem,
                        completed: false,
                        highPriority: this.newItemHighPriority
                    });
                    
                    this.newItem = "";
                    this.newItemHighPriority = false;
                },
                doEdit(editing) {
                    this.editing = editing;
                    this.newItem = "";
                    this.newItemHighPriority = false;
                },
                toggleStatus(item) {
                    item.completed = !item.completed;
                }
            }
        }).mount('#todo-app')
    </script>
</body>
</html>
